<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<title>LifeQuest RPG</title>
<link rel="manifest" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
input, textarea { -webkit-user-select:text; user-select:text; }
:root {
  --bg: #0a0a12; --bg2: #12121f; --bg3: #1a1a2e;
  --gold: #f0c040; --gold-dim: #a08020;
  --xp: #00e5ff; --hp: #ff4060;
  --str: #ff6b35; --int: #7b68ee; --dex: #00e676;
  --cha: #ff69b4; --wis: #ffd700; --end: #20b2aa;
  --text: #e0e0e8; --text2: #8888a0;
  --success: #00e676; --fail: #ff4060;
  --border: rgba(240,192,64,0.15);
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}
html {
  height:100%; touch-action:manipulation;
  overflow-y:scroll; overscroll-behavior-y:none;
}
body { 
  height:100%; background:var(--bg); color:var(--text);
  font-family:'Rajdhani',sans-serif; overflow-x:hidden;
  -webkit-text-size-adjust:100%; touch-action:pan-y;
  overscroll-behavior:none;
  /* iPhone safe areas */
  padding-top: var(--sat);
  padding-bottom: var(--sab);
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(123,104,238,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(240,192,64,0.03) 0%, transparent 50%);
}
#root { position:relative; z-index:1; min-height:100vh; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes levelUp { 0%{transform:scale(1);filter:brightness(1)} 50%{transform:scale(1.15);filter:brightness(1.8)} 100%{transform:scale(1);filter:brightness(1)} }
@keyframes xpGain { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-40px)} }
@keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
@keyframes barFill { from{width:0} }
@keyframes streakPulse { 0%,100%{text-shadow:0 0 10px var(--str)} 50%{text-shadow:0 0 30px var(--str), 0 0 60px var(--gold)} }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script>
// Anti-zoom
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('gestureend', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{if(e.scale!==undefined&&e.scale!==1)e.preventDefault();},{passive:false});
let lte=0;document.addEventListener('touchend',e=>{const n=Date.now();if(n-lte<=300)e.preventDefault();lte=n;},false);
document.addEventListener('dblclick',e=>e.preventDefault());

// SW + Notifs
const SW_CODE=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('notificationclick',e=>{e.notification.close();e.waitUntil(clients.openWindow('/'));});`;
async function registerSW(){if(!('serviceWorker' in navigator))return;try{const b=new Blob([SW_CODE],{type:'application/javascript'});await navigator.serviceWorker.register(URL.createObjectURL(b));}catch(e){}}
async function requestNotifPerm(){if(!('Notification' in window))return'unsupported';if(Notification.permission==='granted')return'granted';if(Notification.permission==='denied')return'denied';return await Notification.requestPermission();}
function schedNotif(title,body,ms){if(Notification.permission!=='granted')return;setTimeout(()=>{try{new Notification(title,{body,vibrate:[200,100,200]});}catch(e){navigator.serviceWorker?.ready?.then(r=>r.showNotification(title,{body}));}},ms);}

// PWA Manifest
const mf={name:"LifeQuest RPG",short_name:"LifeQuest",start_url:".",display:"standalone",background_color:"#0a0a12",theme_color:"#0a0a12",orientation:"portrait",
  icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>",sizes:"any",type:"image/svg+xml"}]};
document.getElementById('manifest-link').href=URL.createObjectURL(new Blob([JSON.stringify(mf)],{type:'application/json'}));
registerSW();
</script>

<script type="text/babel">
const{useState,useEffect,useMemo,useRef}=React;

const CATS=[
  {id:'str',name:'Force',icon:'⚔️',color:'var(--str)'},
  {id:'int',name:'Intelligence',icon:'📚',color:'var(--int)'},
  {id:'dex',name:'Discipline',icon:'🎯',color:'var(--dex)'},
  {id:'cha',name:'Social',icon:'💬',color:'var(--cha)'},
  {id:'wis',name:'Sagesse',icon:'🧘',color:'var(--wis)'},
  {id:'end',name:'Vitalité',icon:'💚',color:'var(--end)'},
];
const DOW=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
const SCHEDS=[
  {id:'daily',label:'Tous les jours',icon:'📅'},
  {id:'weekdays',label:'Lun-Ven',icon:'💼'},
  {id:'weekend',label:'Sam-Dim',icon:'🌴'},
  {id:'custom',label:'Jours précis',icon:'🎯'},
  {id:'weekly',label:'1x/semaine',icon:'📌'},
];
const TITLES=[{l:1,t:'Vagabond'},{l:5,t:'Apprenti'},{l:10,t:'Aventurier'},{l:15,t:'Guerrier'},{l:20,t:'Champion'},{l:25,t:'Héros'},{l:30,t:'Légende'},{l:40,t:'Mythique'},{l:50,t:'Divin'},{l:75,t:'Transcendant'},{l:100,t:'Immortel'}];
const DL=['Facile','Normal','Difficile','Épique','Légendaire'];
const DC=['var(--success)','var(--xp)','var(--str)','var(--int)','var(--gold)'];

const xpFor=l=>Math.floor(100*Math.pow(1.15,l-1));
const getTitle=l=>[...TITLES].reverse().find(t=>l>=t.l)?.t||'Novice';
const td=()=>new Date().toISOString().slice(0,10);
const gdow=ds=>{const d=new Date(ds).getDay();return d===0?6:d-1;};
function isActive(o,ds){const s=o.schedule||'daily',w=gdow(ds);if(s==='daily')return true;if(s==='weekdays')return w<=4;if(s==='weekend')return w>=5;if(s==='custom')return(o.customDays||[]).includes(w);if(s==='weekly')return(o.weeklyDay??0)===w;return true;}

const SK='lifequest_v4';
const DEF={playerName:'',objectives:[],logs:{},createdAt:td(),notifEnabled:false};
const load=()=>{try{return JSON.parse(localStorage.getItem(SK))||DEF;}catch{return DEF;}};
const save=s=>localStorage.setItem(SK,JSON.stringify(s));

// ── Shared Add Quest Form ──
function QuestForm({onAdd, compact}){
  const[f,setF]=useState({name:'',cat:'str',diff:2,schedule:'daily',customDays:[],weeklyDay:0,reminder:'08:00'});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!f.name.trim())return;
    onAdd({id:Date.now(),name:f.name.trim(),cat:f.cat,diff:f.diff,active:true,
      schedule:f.schedule,customDays:f.schedule==='custom'?[...f.customDays]:[],
      weeklyDay:f.schedule==='weekly'?f.weeklyDay:0,reminderTime:f.reminder});
    u('name','');
  };
  const gap=compact?8:10;
  return <div style={{background:'var(--bg2)',borderRadius:12,padding:compact?12:14,border:'1px solid var(--border)'}}>
    <input value={f.name} onChange={e=>u('name',e.target.value)} placeholder="Ex: 30min sport, lire 20 pages..."
      onKeyDown={e=>e.key==='Enter'&&submit()}
      style={{width:'100%',padding:'10px 14px',background:'var(--bg3)',border:'1px solid rgba(255,255,255,0.08)',
        borderRadius:8,color:'var(--text)',fontSize:'1rem',fontFamily:"'Rajdhani'",outline:'none',marginBottom:gap}}/>
    
    {/* Catégorie */}
    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:gap}}>
      {CATS.map(s=><button key={s.id} onClick={()=>u('cat',s.id)} style={{padding:'5px 10px',borderRadius:16,border:'1px solid',fontSize:'0.75rem',cursor:'pointer',
        background:f.cat===s.id?s.color+'20':'transparent',borderColor:f.cat===s.id?s.color:'rgba(255,255,255,0.1)',color:f.cat===s.id?s.color:'var(--text2)'}}>{s.icon} {s.name}</button>)}
    </div>

    {/* Difficulté */}
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:gap}}>
      <span style={{fontSize:'0.75rem',color:'var(--text2)',minWidth:50}}>Difficulté</span>
      <div style={{display:'flex',gap:3,flex:1}}>
        {DL.map((d,i)=><button key={i} onClick={()=>u('diff',i+1)} style={{flex:1,padding:'4px 2px',borderRadius:6,border:'1px solid',fontSize:'0.65rem',cursor:'pointer',
          background:f.diff===i+1?DC[i]+'20':'transparent',borderColor:f.diff===i+1?DC[i]:'rgba(255,255,255,0.08)',color:f.diff===i+1?DC[i]:'var(--text2)'}}>{d}</button>)}
      </div>
    </div>

    {/* Fréquence */}
    <div style={{marginBottom:gap}}>
      <span style={{fontSize:'0.75rem',color:'var(--text2)',display:'block',marginBottom:4}}>📅 Fréquence</span>
      <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
        {SCHEDS.map(s=><button key={s.id} onClick={()=>u('schedule',s.id)} style={{padding:'5px 8px',borderRadius:8,border:'1px solid',fontSize:'0.7rem',cursor:'pointer',
          background:f.schedule===s.id?'var(--xp)20':'transparent',borderColor:f.schedule===s.id?'var(--xp)':'rgba(255,255,255,0.08)',color:f.schedule===s.id?'var(--xp)':'var(--text2)'}}>{s.icon} {s.label}</button>)}
      </div>
    </div>

    {f.schedule==='custom'&&<div style={{display:'flex',gap:4,marginBottom:gap}}>
      {DOW.map((d,i)=><button key={i} onClick={()=>setF(p=>({...p,customDays:p.customDays.includes(i)?p.customDays.filter(x=>x!==i):[...p.customDays,i]}))}
        style={{flex:1,padding:'6px 2px',borderRadius:6,border:'1px solid',fontSize:'0.7rem',cursor:'pointer',
          background:f.customDays.includes(i)?'var(--dex)20':'transparent',borderColor:f.customDays.includes(i)?'var(--dex)':'rgba(255,255,255,0.08)',color:f.customDays.includes(i)?'var(--dex)':'var(--text2)'}}>{d}</button>)}
    </div>}

    {f.schedule==='weekly'&&<div style={{marginBottom:gap}}>
      <span style={{fontSize:'0.7rem',color:'var(--text2)',marginBottom:4,display:'block'}}>Quel jour ?</span>
      <div style={{display:'flex',gap:4}}>
        {DOW.map((d,i)=><button key={i} onClick={()=>u('weeklyDay',i)} style={{flex:1,padding:'6px 2px',borderRadius:6,border:'1px solid',fontSize:'0.7rem',cursor:'pointer',
          background:f.weeklyDay===i?'var(--int)20':'transparent',borderColor:f.weeklyDay===i?'var(--int)':'rgba(255,255,255,0.08)',color:f.weeklyDay===i?'var(--int)':'var(--text2)'}}>{d}</button>)}
      </div>
    </div>}

    {/* Rappel */}
    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:gap}}>
      <span style={{fontSize:'0.75rem',color:'var(--text2)'}}>⏰ Rappel</span>
      <input type="time" value={f.reminder} onChange={e=>u('reminder',e.target.value)}
        style={{padding:'4px 8px',background:'var(--bg3)',border:'1px solid rgba(255,255,255,0.1)',borderRadius:6,color:'var(--text)',fontSize:'0.85rem',fontFamily:"'Rajdhani'",outline:'none'}}/>
    </div>

    <button onClick={submit} style={{width:'100%',padding:'10px',background:'var(--bg3)',border:'1px solid var(--border)',
      borderRadius:8,color:'var(--gold)',fontSize:'0.95rem',cursor:'pointer',fontFamily:"'Rajdhani'",fontWeight:600}}>+ Ajouter cette quête</button>
  </div>;
}

// ── Components ──
function XPFloat({amount,label,color,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,1200);return()=>clearTimeout(t);},[]);
  return<span style={{position:'fixed',top:label?'38%':'45%',left:'50%',transform:'translate(-50%,-50%)',
    color:color||'var(--xp)',fontSize:label?'1rem':'1.8rem',fontFamily:"'Press Start 2P'",pointerEvents:'none',
    animation:'xpGain 1.2s ease-out forwards',zIndex:9999,textShadow:`0 0 20px ${color||'var(--xp)'}`}}>{label?label+' ':''}{label?'':''} +{amount} XP</span>;
}

function Bar({value,max,color,height=8,label}){
  const pct=Math.min(100,(value/max)*100);
  return<div>{label&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:3,fontSize:'0.75rem',color:'var(--text2)'}}><span>{label}</span><span>{value}/{max}</span></div>}
    <div style={{width:'100%',height,background:'rgba(255,255,255,0.06)',borderRadius:height/2,overflow:'hidden'}}>
      <div style={{width:pct+'%',height:'100%',borderRadius:height/2,background:`linear-gradient(90deg, ${color}, ${color}dd)`,boxShadow:`0 0 10px ${color}40`,animation:'barFill 0.8s ease-out',transition:'width 0.5s ease'}}/></div></div>;
}

// ── SETUP ──
function SetupPage({onComplete}){
  const[step,setStep]=useState(0);
  const[name,setName]=useState('');
  const[objectives,setObjectives]=useState([]);

  const finish=()=>{if(objectives.length>0)onComplete({playerName:name||'Héros',objectives});};

  return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
    padding:'20px',paddingTop:'calc(20px + var(--sat))',paddingBottom:'calc(20px + var(--sab))'}}>
    <div style={{maxWidth:500,width:'100%',animation:'fadeIn 0.6s'}}>
      {step===0&&<div style={{textAlign:'center'}}>
        <div style={{fontSize:'3rem',marginBottom:8}}>⚔️</div>
        <h1 style={{fontFamily:"'Cinzel'",fontSize:'2rem',color:'var(--gold)',marginBottom:8}}>LifeQuest</h1>
        <p style={{color:'var(--text2)',marginBottom:32}}>Transforme ta vie en RPG</p>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ton nom de héros..."
          style={{width:'100%',padding:'14px 20px',background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:12,color:'var(--text)',fontSize:'1.1rem',fontFamily:"'Rajdhani'",outline:'none',textAlign:'center',marginBottom:20}}/>
        <button onClick={()=>setStep(1)} style={{width:'100%',padding:'14px',
          background:'linear-gradient(135deg,var(--gold),var(--gold-dim))',border:'none',borderRadius:12,
          color:'var(--bg)',fontSize:'1.1rem',fontWeight:700,fontFamily:"'Cinzel'",cursor:'pointer'}}>Commencer</button>
      </div>}

      {step===1&&<div>
        <h2 style={{fontFamily:"'Cinzel'",color:'var(--gold)',marginBottom:4,fontSize:'1.3rem'}}>Définis tes quêtes</h2>
        <p style={{color:'var(--text2)',marginBottom:14,fontSize:'0.85rem'}}>Objectif + fréquence + heure de rappel</p>

        <div style={{marginBottom:14}}>
          <QuestForm onAdd={o=>setObjectives(p=>[...p,o])} />
        </div>

        {/* Liste */}
        <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:16,maxHeight:240,overflowY:'auto'}}>
          {objectives.map((o,i)=>{
            const cat=CATS.find(s=>s.id===o.cat);const sl=SCHEDS.find(s=>s.id===o.schedule)?.label||'';
            return<div key={o.id} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 12px',
              background:'var(--bg2)',borderRadius:10,border:'1px solid rgba(255,255,255,0.05)',animation:`slideIn 0.3s ease-out ${i*0.05}s both`}}>
              <span>{cat?.icon}</span>
              <div style={{flex:1,minWidth:0}}><div style={{fontSize:'0.9rem',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{o.name}</div>
                <div style={{fontSize:'0.6rem',color:'var(--text2)'}}>{sl} · {o.reminderTime}</div></div>
              <span style={{fontSize:'0.65rem',color:DC[o.diff-1],padding:'2px 6px',background:DC[o.diff-1]+'15',borderRadius:8}}>{DL[o.diff-1]}</span>
              <button onClick={()=>setObjectives(p=>p.filter(x=>x.id!==o.id))} style={{background:'none',border:'none',color:'var(--fail)',cursor:'pointer',fontSize:'1.1rem'}}>×</button>
            </div>;
          })}
        </div>

        {objectives.length>0?<button onClick={finish} style={{width:'100%',padding:'14px',
          background:'linear-gradient(135deg,var(--gold),var(--gold-dim))',border:'none',borderRadius:12,
          color:'var(--bg)',fontSize:'1.1rem',fontWeight:700,fontFamily:"'Cinzel'",cursor:'pointer'}}>
          Lancer ({objectives.length} objectifs)</button>
          :<p style={{textAlign:'center',color:'var(--text2)',fontSize:'0.85rem'}}>Ajoute au moins 1 objectif</p>}
      </div>}
    </div>
  </div>;
}

// ── DASHBOARD ──
function Dashboard({state,setState}){
  const[view,setView]=useState('daily');
  const[floats,setFloats]=useState([]);
  const[levelUpAnim,setLevelUpAnim]=useState(false);
  const[showAdd,setShowAdd]=useState(false);
  const today=td();
  const todayLog=state.logs[today]||{};

  // Auto-reset
  useEffect(()=>{
    const ck=()=>{const t=td();if(!state.logs[t]){const ns={...state,logs:{...state.logs,[t]:{}}};setState(ns);save(ns);}};
    ck();const iv=setInterval(ck,30000);return()=>clearInterval(iv);
  },[state]);

  // Notifs
  useEffect(()=>{
    if(!state.notifEnabled||Notification.permission!=='granted')return;
    const now=new Date();
    const todayObjs=state.objectives.filter(o=>o.active&&isActive(o,today));
    const times=[...new Set(todayObjs.map(o=>o.reminderTime||'08:00'))];
    times.forEach(time=>{const[h,m]=time.split(':').map(Number);const t=new Date(now);t.setHours(h,m,0,0);const d=t-now;
      if(d>0&&d<86400000){const p=todayObjs.filter(o=>(o.reminderTime||'08:00')===time&&!todayLog[o.id]);
        if(p.length>0)schedNotif('⚔️ LifeQuest',`${p.length} quête(s) en attente!`,d);}});
    const w=new Date(now);w.setHours(21,0,0,0);const wd=w-now;
    if(wd>0){const r=todayObjs.filter(o=>!todayLog[o.id]).length;if(r>0)schedNotif('🏰 Fin de journée',`${r} quête(s) avant minuit!`,wd);}
  },[state.notifEnabled,today]);

  // ── Compute stats ──
  const computed=useMemo(()=>{
    const logs=state.logs,days=Object.keys(logs).sort();
    let totalXP=0;const statXP={};CATS.forEach(s=>statXP[s.id]=0);
    let bestStreak=0,tempStreak=0;
    const dailyScores=[];
    let totalDone=0,totalPossible=0;

    // Weekly buckets for improvement tracking
    const weeklyData={};

    days.forEach(day=>{
      const log=logs[day];let dd=0,dt=0;
      state.objectives.filter(o=>o.active&&isActive(o,day)).forEach(o=>{
        dt++;totalPossible++;
        if(log[o.id]){dd++;totalDone++;const xp=o.diff*10;totalXP+=xp;statXP[o.cat]=(statXP[o.cat]||0)+xp;}
      });
      const score=dt>0?Math.round((dd/dt)*100):0;
      dailyScores.push({day,score,done:dd,total:dt});
      if(score>=50){tempStreak++;if(tempStreak>bestStreak)bestStreak=tempStreak;}else tempStreak=0;

      // Week number (ISO week)
      const d=new Date(day);
      const jan1=new Date(d.getFullYear(),0,1);
      const weekNum=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
      const weekKey=d.getFullYear()+'-W'+String(weekNum).padStart(2,'0');
      if(!weeklyData[weekKey])weeklyData[weekKey]={scores:[],done:0,total:0};
      weeklyData[weekKey].scores.push(score);
      weeklyData[weekKey].done+=dd;
      weeklyData[weekKey].total+=dt;
    });

    // Current streak
    let currentStreak=0;
    for(let i=days.length-1;i>=0;i--){
      const log=logs[days[i]];let d=0,t=0;
      state.objectives.filter(o=>o.active&&isActive(o,days[i])).forEach(o=>{t++;if(log[o.id])d++;});
      if(t>0&&(d/t)>=0.5)currentStreak++;else break;
    }

    // Streak XP
    for(let s=1;s<=currentStreak;s++){totalXP+=5;if(s%2===0)totalXP+=20;}
    const streakBonusXP=Math.floor(currentStreak/2)*20;

    let level=1,xpUsed=0;
    while(totalXP-xpUsed>=xpFor(level)){xpUsed+=xpFor(level);level++;}

    const statLevels={};
    CATS.forEach(s=>{let sl=1,su=0;while(statXP[s.id]-su>=sl*50){su+=sl*50;sl++;}statLevels[s.id]=sl;});

    // Weekly improvement
    const weekKeys=Object.keys(weeklyData).sort();
    const weeklyImprovements=[];
    for(let i=0;i<weekKeys.length;i++){
      const w=weeklyData[weekKeys[i]];
      const avg=w.scores.length>0?Math.round(w.scores.reduce((a,b)=>a+b,0)/w.scores.length):0;
      const winRate=w.total>0?Math.round((w.done/w.total)*100):0;
      let improvement=null;
      if(i>0){
        const pw=weeklyData[weekKeys[i-1]];
        const prevAvg=pw.scores.length>0?Math.round(pw.scores.reduce((a,b)=>a+b,0)/pw.scores.length):0;
        improvement=avg-prevAvg;
      }
      weeklyImprovements.push({week:weekKeys[i],avg,winRate,improvement,days:w.scores.length});
    }

            📥 Importer
            <input type="file" accept=".json" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
              r.onload=ev=>{try{const d=JSON.parse(ev.target.result);setState(d);save(d);alert('OK!');}catch{alert('Erreur');}};r.readAsText(f);}}/></label>
          <button onClick={resetAll} style={{padding:10,background:'rgba(255,64,96,0.06)',border:'1px solid rgba(255,64,96,0.2)',borderRadius:10,color:'var(--fail)',cursor:'pointer',fontSize:'0.85rem'}}>🗑️ Reset total</button>
        </div>
      </div>}
    </div>

    {/* NAV */}
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:500,
      display:'flex',background:'rgba(18,18,31,0.95)',borderTop:'1px solid var(--border)',
      padding:'8px 0',paddingBottom:'max(8px, var(--sab))',zIndex:100,
      backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}}>
      {NAV.map(n=><button key={n.id} onClick={()=>setView(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,
        background:'none',border:'none',cursor:'pointer',padding:'4px 0',
        color:view===n.id?'var(--gold)':'var(--text2)',transition:'color 0.2s'}}>
        <span style={{fontSize:'1.1rem'}}>{n.icon}</span>
        <span style={{fontSize:'0.55rem',letterSpacing:1,textTransform:'uppercase'}}>{n.label}</span>
      </button>)}
    </div>
  </div>;
}

// ── ROOT ──
function App(){
  const[state,setState]=useState(()=>{
    let s=load();
    // Migrate old versions
    if(!s.objectives?.length){
      try{const v=localStorage.getItem('lifequest_v3')||localStorage.getItem('lifequest_v2');
        if(v){const old=JSON.parse(v);if(old?.objectives?.length){
          s={...old,objectives:old.objectives.map(o=>({...o,schedule:o.schedule||'daily',customDays:o.customDays||[],weeklyDay:o.weeklyDay||0,reminderTime:o.reminderTime||'08:00'}))};save(s);}}}catch{}}
    // Ensure today
    const t=td();if(s.objectives?.length&&!s.logs[t]){s={...s,logs:{...s.logs,[t]:{}}};save(s);}
    return s;
  });

  if(!state.objectives?.length)return<SetupPage onComplete={data=>{
    const ns={...DEF,...data,createdAt:td(),logs:{[td()]:{}}};setState(ns);save(ns);}}/>;
  return<Dashboard state={state} setState={setState}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
