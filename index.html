<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Up My Life</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --accent: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Écrans */
        .screen {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .hidden { display: none; }

        /* Setup Screen - Sélection des objectifs */
        .goal-option {
            background: #334155;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }

        .goal-option:hover { border-color: var(--primary); }
        .goal-option.selected { background: var(--primary); color: white; }

        /* Dashboard Screen */
        .stats-container {
            margin-bottom: 20px;
            text-align: left;
        }

        .progress-bar-bg {
            background: #334155;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        #progress-fill {
            background: var(--accent);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #334            155;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
        }

        .task-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
        }

        /* Animations */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .level-up-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--accent);
            color: white;
            padding: 2rem;
            border-radius: 20px;
            font-size: 2rem;
            font-weight: bold;
            z-index: 100;
            display: none;
            animation: pop 0.5s ease;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- POPUP LEVEL UP -->
    <div id="level-up-popup" class="level-up-popup">LEVEL UP! 🎉</div>

    <!-- SCREEN 1: SETUP -->
    <div id="setup-screen" class="screen">
        <h2>Choisir tes Quêtes</h2>
        <p>Sélectionne tes objectifs pour commencer</p>
        <div id => goals-list>
            <div class="goal-option" onclick="toggleGoal(this, 'Sport')">🏋️ Sport</div>
            <div class="goal-option" onclick="toggleGoal(this, 'Lecture')">📚 Lecture</div>
            <div class="goal-option" onclick="toggleGoal(this, 'Code')">💻 Apprendre le Code</div>
            <div class="goal-option" onclick="toggleGoal(this, 'Méditation')">🧘 Méditation</div>
        </div>
        <button onclick="startGame()">Commencer l'aventure</button>
    </div>

    <!-- SCREEN 2: DASHBOARD -->
    <div id="game-screen" class="screen hidden">
        <div class="stats-container">
            <div style="display: flex; justify-content: space-between;">
                <span id="lvl-display">Niveau 1</span>
                <span id="xp-display">0/100 XP</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill"></div>
            </div>
        </div>

        <div id="active-tasks">
            <!-- Les tâches apparaîtront ici -->
        </div>
    </div>

    <script>
        let selectedGoals = [];
        let xp = 0;
        let level = 1;
        let xpNextLevel = 100;

        function toggleGoal(el, goal) {
            el.classList.toggle('selected');
            if (selectedGoals.includes(goal)) {
                selectedGoals = selectedGoals.filter(g => g !== goal);
            } else {
                selectedGoals.push(goal);
            }
        }

        function startGame() {
            if (selectedGoals.length === 0) {
                alert("Choisis au moins un objectif !");
                return;
            }
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('active-tasks');
            container.innerHTML = '';
            selectedGoals.forEach((goal, index) => {
                const div = document.createElement('div');
                div.className = 'task-item';
                div.innerHTML = `<span>${goal}</span> <span>+25 XP</span>`;
                div.onclick = () => completeTask(div, 25);
                container.appendChild(div);
            });
        }

        function completeTask(element, amount) {
            if (element.classList.contains('completed')) return;

            element.classList.add('completed');
            addXP(amount);
        }

        function addXP(amount) {
            xp += amount;
            
            if (xp >= xpNextLevel) {
                levelUp();
            }

            updateUI();
        }

        function levelUp() {
            level++;
            xp = xp - xpNextLevel;
            xpNextLevel = Math.round(xpNextLevel * 1.2); // Le niveau suivant est plus dur
            
            const popup = document.getElementById('level-up-popup');
            popup.style.display = 'block';
            setTimeout(() => { popup.style.display = 'none'; }, 2000);
        }

        function updateUI() {
            document.getElementById('lvl-display').innerText = `Niveau ${level}`;
            document.getElementById('xp-display').innerText = `${xp}/${xpNextLevel} XP`;
            const progressPercent = (xp / xpNextLevel) * 100;
            document.getElementById('progress-fill').style.width = progressPercent + '%';
        }
    </script>
</body>
</html>
